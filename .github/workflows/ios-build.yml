name: iOS Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps

      - name: Build Web App
        run: |
          npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://tgfuufsgkelgjjktbugg.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_BfvqG2R0d19EpcX8Xeu9nQ_93liMI2h' }}
          NEXT_PUBLIC_INSFORGE_URL: ${{ secrets.NEXT_PUBLIC_INSFORGE_URL || 'https://g76b2t5b.eu-central.insforge.app' }}
          NEXT_PUBLIC_INSFORGE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_INSFORGE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3OC0xMjM0LTU2NzgtOTBhYi1jZGVmMTIzNDU2NzgiLCJlbWFpbCI6ImFub25AaW5zZm9yZ2UuY29tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNzY4NDJ9.gmQYWakDBVkteGBmq-Oy9MJphjvsTJi07aFd1_JasUY' }}

      - name: Capacitor Sync
        run: |
          npx cap sync ios

      - name: Generate App Assets
        run: |
          npm run assets:generate

      - name: Link GoogleService-Info.plist
        run: |
          cd ios/App
          cat << 'EOF' > add_plist.rb
          require 'xcodeproj'
          project = Xcodeproj::Project.open('App.xcodeproj')
          target = project.targets.find { |t| t.name == 'App' }
          group = project.main_group.find_subpath('App', true)
          unless group.files.any? { |f| f.path == 'GoogleService-Info.plist' || f.name == 'GoogleService-Info.plist' }
            file = group.new_file('GoogleService-Info.plist')
            target.add_resources([file])
            project.save
            puts "Added GoogleService-Info.plist to project"
          end
          EOF
          gem install xcodeproj --no-document
          ruby add_plist.rb

      - name: Build iOS App
        run: |
          cd ios/App
          xcodebuild -project App.xcodeproj -scheme App -sdk iphoneos -configuration Release clean build -derivedDataPath $PWD/DerivedData CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" COMPILER_INDEX_STORE_ENABLE=NO

      - name: Export IPA (Unsigned)
        run: |
          # Find the .app file in the DerivedData build directory
          APP_PATH=$(find ios/App/DerivedData/Build/Products/Release-iphoneos -name "*.app" | head -n 1)
          APP_NAME=$(basename "$APP_PATH")
          
          cd $(dirname "$APP_PATH")
          mkdir Payload
          cp -r "$APP_NAME" Payload/
          zip -r App.ipa Payload
          # Move it to the root of the repository using absolute path
          mv App.ipa "$GITHUB_WORKSPACE/App-unsigned.ipa"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-unsigned
          path: App-unsigned.ipa

name: iOS Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps

      - name: Build Web App
        run: |
          npm run build

      - name: Capacitor Sync
        run: |
          npx cap sync ios

      - name: Build iOS App
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos -configuration Release archive -archivePath $PWD/build/App.xcarchive CODE_SIGNING_ALLOWED=NO

      - name: Export IPA (Unsigned)
        run: |
          cd ios/App/build/App.xcarchive/Products/Applications
          mkdir Payload
          cp -r App.app Payload/
          zip -r App.ipa Payload
          mv App.ipa ../../../../../App-unsigned.ipa

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-unsigned
          path: App-unsigned.ipa
